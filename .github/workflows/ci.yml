name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy:
        description: '프로덕션 배포까지 진행 (체크하지 않으면 빌드/테스트만 실행)'
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Backend ──────────────────────────────────────────────────────────
  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install ruff
      - run: ruff check backend/

  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ifl_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/ifl_test
      DATABASE_URL_SYNC: postgresql://test:test@localhost:5432/ifl_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov aiosqlite httpx python-pptx
      - run: cd backend && pytest -m "not integration" --cov=app --cov-report=xml --cov-fail-under=60 -q
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ── Frontend ─────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run lint

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm test

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npm run build

  # ── Dockerfile ↔ Dockerfile.prod 베이스 이미지 패리티 가드 ────────────────
  # Dependabot docker 업데이터는 `Dockerfile`(정확히 그 이름)만 스캔하고
  # `Dockerfile.prod`(= CI/프로덕션 실제 빌드 파일)는 못 본다. 그래서 베이스
  # 이미지 bump PR(#66 python3.14, #69→#151 node24)이 dev `Dockerfile` 만
  # 바꿔 머지돼도 prod 에 무효였다. 두 파일의 베이스 이미지가 어긋나면
  # 여기서 CI 를 red 로 만들어 .prod 동기화를 강제한다(드리프트 영구 차단).
  dockerfile-parity:
    name: Dockerfile Parity (dev ↔ prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Assert base images match
        run: |
          set -euo pipefail
          # FROM 줄에서 이미지 ref(태그 포함)만 추출, `AS <stage>` 제거 후 유니크.
          bases() { grep -iE '^[[:space:]]*FROM[[:space:]]' "$1" \
            | sed -E 's/^[[:space:]]*[Ff][Rr][Oo][Mm][[:space:]]+//; s/[[:space:]]+[Aa][Ss][[:space:]]+.*$//' \
            | awk '{print $1}' | sort -u; }
          fail=0
          for svc in backend frontend; do
            dev="$svc/Dockerfile"; prod="$svc/Dockerfile.prod"
            [ -f "$dev" ] && [ -f "$prod" ] || { echo "skip $svc (파일 없음)"; continue; }
            dev_b="$(bases "$dev")"
            prod_b="$(bases "$prod")"
            # dev 의 베이스(보통 1종)가 prod 의 모든 스테이지 베이스와 동일해야 함.
            if [ "$(echo "$prod_b" | sort -u)" != "$dev_b" ]; then
              echo "::error file=$prod::[$svc] 베이스 이미지 불일치 — dev=[$dev_b] vs prod=[$(echo "$prod_b" | paste -sd, -)]. Dockerfile.prod 를 동기화하세요."
              fail=1
            else
              echo "[$svc] OK — $dev_b"
            fi
          done
          exit $fail

  # ── Docker Build & Push to GHCR ───────────────────────────────────────
  # main 또는 임의 브랜치에 push 되면 backend / frontend 이미지를 빌드해
  # ghcr.io/hdj82-bot/ifl-{backend,frontend} 로 push.
  # main:    :latest, :sha-<short>
  # 그 외:   :branch-<name>, :sha-<short>
  # PR(fork 포함)에서는 GHCR 권한 문제로 push 하지 않음.
  docker-build-push:
    name: Docker Build & Push (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, frontend-build, dockerfile-parity]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            context: ./backend
            dockerfile: backend/Dockerfile.prod
            image: ghcr.io/hdj82-bot/ifl-backend
          - name: frontend
            context: ./frontend
            dockerfile: frontend/Dockerfile.prod
            image: ghcr.io/hdj82-bot/ifl-frontend
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch,prefix=branch-,enable=${{ github.ref_name != 'main' }}

      - name: Build (load locally for scan)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ matrix.image }}:scan-${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      # CRITICAL/HIGH 취약점이 있으면 push 전에 차단. unfixed 는 무시 (베이스 이미지
      # 패치가 아직 안 나온 항목까지 막으면 빌드가 막힘).
      #
      # skip-dirs:
      #  - node 공식 이미지가 번들한 npm 자체의 의존성(/usr/local/lib/node_modules/npm/**) 은
      #    Dockerfile 에서 제어 불가능. node 이미지 patch release 에 종속되므로
      #    스캔 대상에서 제외. 우리 앱 의존성(/app/node_modules/**) 은 그대로 검사.
      #  - python venv 의 stdlib 도 동일 이유 (이미지 종속) — backend 영향 시 추가 가능.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          vuln-type: 'os,library'
          skip-dirs: 'usr/local/lib/node_modules/npm'
          # 임시 ignore (dependabot patch PR 도착 시 .trivyignore 정리).
          trivyignores: '.trivyignore'
          timeout: 10m

      - name: Push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ── Deploy to Production ─────────────────────────────────────────────
  # 1) 활성화 절차: Repository → Settings → Secrets and variables → Actions
  #    → Variables 탭에서 DEPLOY_ENABLED = "true" 추가 + secrets 3종
  #    (DEPLOY_HOST / DEPLOY_USER / DEPLOY_SSH_KEY) 등록.
  # 2) 활성화된 후에도 main 푸시만으로는 배포되지 않는다. 다음 두 경로 중
  #    하나여야 deploy job 이 실행된다 (사고 방지):
  #      a. refs/tags/v* 형태의 릴리스 태그 푸시 (예: git tag v1.2.3 && git push --tags)
  #      b. Actions → Run workflow 에서 'deploy' 입력을 체크한 수동 트리거 (main 한정)
  # 3) 추가 안전장치로 production environment 에 Required reviewers 를
  #    구성할 것을 권장 (Settings → Environments → production → Deployment
  #    protection rules → Required reviewers). 자세한 내용은 README 의
  #    "프로덕션 배포 게이트 활성화" 절 참고.
  # 4) 서버에서 GHCR 이미지를 pull 하려면 최초 1회 docker login ghcr.io 가
  #    필요하다 (private 패키지일 경우).
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: |
      always()
      && (needs.docker-build-push.result == 'success' || needs.docker-build-push.result == 'skipped')
      && vars.DEPLOY_ENABLED == 'true'
      && (
        startsWith(github.ref, 'refs/tags/v')
        || (github.event_name == 'workflow_dispatch' && inputs.deploy == true && github.ref == 'refs/heads/main')
      )
    environment: production
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          # MITM 방지 — 빈 값이면 처음 보는 호스트로도 자동 접속하므로
          # `ssh-keyscan -t rsa,ed25519 <서버 IP>` 결과를 통째로 secret 으로 등록.
          # 등록 방법은 docs/DEPLOYMENT.md "SSH host key 등록" 절 참고.
          fingerprint: ${{ secrets.DEPLOY_HOST_FINGERPRINT }}
          known_hosts: ${{ secrets.DEPLOY_HOST_KEY }}
          script: |
            cd /opt/ifl-platform
            ./scripts/deploy.sh update
