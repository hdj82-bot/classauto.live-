name: Daily Supabase Backup

# 관리형 Supabase 스택(프로덕션)용 일 1회 pg_dump 백업 + 복원 검증.
# OPERATIONS_RUNBOOK.md §8.6 의 "반자동 옵션" 구현.
#
# 왜 별도 워크플로인가:
#   기존 .github/workflows/backup.yml 은 자체호스팅(VPS+Docker) 전용이며
#   `vars.DEPLOY_ENABLED == 'true'` 일 때만 돈다. 현재 프로덕션은 관리형
#   Supabase(Free 티어 — PITR 없음)라 그 워크플로가 돌지 않아 자동 백업이
#   전무했다. 이 워크플로가 그 갭을 메운다(별도 게이트·주기).
#
# 동작:
#   1) Supabase Direct URL 로 pg_dump → gzip → S3 업로드(scripts/supabase-backup.sh).
#   2) 방금 올린 백업을 S3 에서 다시 받아 throwaway Postgres 에 복원(round-trip)하고
#      public 테이블 수 > 0 인지 검증한다 — "백업이 실제로 복원되는가"를 매일 확인(H6).
#
# 주기(H6): 주 1회 → 일 1회. 매일 03:00 KST = 18:00 UTC. 베타 데이터 손실 위험을
#   하루치로 줄인다. 보관 정책(30/90일)은 S3 버킷 lifecycle 로 설정.
#
# 활성화(교수님 1회 설정):
#   Settings → Secrets and variables → Actions
#     · Variables: SUPABASE_BACKUP_ENABLED = "true"
#     · Secrets:   SUPABASE_DB_URL  (postgresql://postgres.<ref>:<pw>@<host>:5432/postgres)
#                  BACKUP_S3_BUCKET, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION

on:
  schedule:
    # 매일 03:00 KST = 18:00 UTC (KST=UTC+9, DST 없음).
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "수동 백업 사유 (감사용)"
        required: false
        default: "manual run"

permissions:
  contents: read

jobs:
  backup:
    name: Supabase pg_dump → S3 → restore test
    runs-on: ubuntu-latest
    if: vars.SUPABASE_BACKUP_ENABLED == 'true'
    timeout-minutes: 30

    # 복원 검증용 throwaway DB. pgvector 이미지라 임베딩(vector) 스키마도 복원된다.
    # Supabase 고유 스키마(auth/storage 등)·role 은 없으므로 복원 시 일부 문장은
    # 에러가 나지만(ON_ERROR_STOP=0 으로 허용), 앱 테이블이 사는 public 스키마가
    # 정상 복원됐는지를 테이블 수로 검증한다.
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: restore_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install postgresql-client (matches server — pg17)
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL "https://www.postgresql.org/media/keys/ACCC4CF8.asc" \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          # shellcheck disable=SC1091
          . /etc/os-release
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Dump → gzip → upload
        env:
          # connection string 자체가 secret. echo / 출력 금지.
          PGURL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          set -euo pipefail
          if [ -z "${PGURL:-}" ]; then
            echo "::error::SUPABASE_DB_URL secret is empty"
            exit 1
          fi
          if [ -z "${BACKUP_S3_BUCKET:-}" ]; then
            echo "::error::BACKUP_S3_BUCKET secret is empty"
            exit 1
          fi
          chmod +x scripts/supabase-backup.sh
          # 스크립트가 자체적으로 <1KB 사이즈 가드(덤프 실패 탐지)를 수행한 뒤 S3 업로드.
          ./scripts/supabase-backup.sh

      - name: Restore test (S3 round-trip → throwaway Postgres)
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
          # supabase-backup.sh 와 동일 기본 prefix. 스크립트에서 BACKUP_S3_PREFIX 를
          # 바꿨다면 여기도 같은 값으로 맞춘다.
          BACKUP_S3_PREFIX: ifl-backup/supabase
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          DAY="$(date -u +%Y%m%d)"
          BASE="s3://${BACKUP_S3_BUCKET}/${BACKUP_S3_PREFIX}/${DAY}/"

          # 방금 올린(오늘자 최신) 백업 객체 키를 고른다.
          KEY="$(aws s3 ls "${BASE}" | sort | tail -n1 | awk '{print $4}')"
          if [ -z "${KEY}" ]; then
            echo "::error::오늘자(${DAY}) 백업 객체를 S3 에서 찾지 못했습니다: ${BASE}"
            exit 1
          fi
          aws s3 cp "${BASE}${KEY}" ./restore-test.sql.gz --only-show-errors --no-progress

          # ── 사이즈 가드(round-trip) ── 다운로드한 아티팩트가 비정상적으로 작으면 중단.
          SIZE="$(stat -c%s ./restore-test.sql.gz)"
          echo "downloaded backup: ${KEY} (${SIZE} bytes)"
          if [ "${SIZE}" -lt 1024 ]; then
            echo "::error::백업 파일이 비정상적으로 작습니다(<1KB) — 덤프/업로드 손상 의심."
            exit 1
          fi

          # ── 복원 ── Supabase 고유 role/스키마가 없어 일부 문장은 에러나므로 ON_ERROR_STOP=0.
          gunzip -c ./restore-test.sql.gz \
            | psql -v ON_ERROR_STOP=0 -h localhost -U postgres -d restore_test >/dev/null 2>&1 || true

          # ── 검증 ── 앱 테이블이 사는 public 스키마에 테이블이 복원됐는지 확인.
          TABLES="$(psql -h localhost -U postgres -d restore_test -tAc \
            "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'")"
          TABLES="$(echo "${TABLES}" | tr -d '[:space:]')"
          echo "restored public tables: ${TABLES:-0}"
          if [ "${TABLES:-0}" -lt 1 ]; then
            echo "::error::복원 후 public 테이블이 0개 — 백업이 복원 불가 상태일 수 있습니다."
            exit 1
          fi
          echo "restore test PASSED — ${TABLES} public tables restored."

      - name: Summary
        run: |
          echo "Daily Supabase backup uploaded to s3://${BACKUP_S3_BUCKET:-?}/ifl-backup/supabase/$(date -u +%Y%m%d)/" >> "$GITHUB_STEP_SUMMARY"
          echo "Restore test (S3 round-trip → throwaway Postgres) passed." >> "$GITHUB_STEP_SUMMARY"
          echo "Retention is enforced via S3 bucket lifecycle policy." >> "$GITHUB_STEP_SUMMARY"
        env:
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
