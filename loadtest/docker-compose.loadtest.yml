version: "3.9"

services:
  locust-master:
    image: locustio/locust:2.29.1
    container_name: locust-master
    ports:
      - "8089:8089"
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
    environment:
      - TARGET_HOST=${TARGET_HOST:-http://host.docker.internal:8000}
      - STUDENT_TOKEN=${STUDENT_TOKEN:-test-student-token}
      - PROFESSOR_TOKEN=${PROFESSOR_TOKEN:-test-professor-token}
      - TEST_LECTURE_ID=${TEST_LECTURE_ID:-}
      - TEST_COURSE_ID=${TEST_COURSE_ID:-}
      - TEST_VIDEO_ID=${TEST_VIDEO_ID:-}
      - HEARTBEAT_COUNT=${HEARTBEAT_COUNT:-5}
    command: >
      -f /mnt/locust/locustfile.py
      --master
      --host ${TARGET_HOST:-http://host.docker.internal:8000}
    networks:
      - loadtest

  locust-worker:
    image: locustio/locust:2.29.1
    volumes:
      - ./locustfile.py:/mnt/locust/locustfile.py:ro
    environment:
      - TARGET_HOST=${TARGET_HOST:-http://host.docker.internal:8000}
      - STUDENT_TOKEN=${STUDENT_TOKEN:-test-student-token}
      - PROFESSOR_TOKEN=${PROFESSOR_TOKEN:-test-professor-token}
      - TEST_LECTURE_ID=${TEST_LECTURE_ID:-}
      - TEST_COURSE_ID=${TEST_COURSE_ID:-}
      - TEST_VIDEO_ID=${TEST_VIDEO_ID:-}
      - HEARTBEAT_COUNT=${HEARTBEAT_COUNT:-5}
    command: >
      -f /mnt/locust/locustfile.py
      --worker
      --master-host locust-master
    depends_on:
      - locust-master
    deploy:
      replicas: 4
    networks:
      - loadtest

networks:
  loadtest:
    driver: bridge
