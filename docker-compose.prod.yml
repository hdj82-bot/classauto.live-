version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ifl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifl_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/hdj82-bot/ifl-backend:${IFL_IMAGE_TAG:-latest}
    # container_name 제거: deploy.sh 가 rolling restart 시
    # `--scale backend=2` 로 새 컨테이너를 띄우려면 고정 이름이 없어야 한다.
    restart: unless-stopped
    env_file:
      - .env
    # 호스트 포트 미노출 — nginx 가 Docker 내부 네트워크(backend:8000)로 접근.
    # Docker 는 UFW 규칙을 우회하므로 ports 매핑 시 공용 인터넷에 노출되어
    # nginx/SSL/rate-limit/CSP 가 전부 우회됨.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
      - ./scripts/docker-entrypoint.sh:/opt/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/opt/docker-entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    # Rolling restart: 진행 중 요청을 끝낼 시간 확보 (uvicorn graceful shutdown).
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      # 새 컨테이너가 import + DB 커넥션 풀 초기화까지 시간이 들 수 있으므로 상향.
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    image: ghcr.io/hdj82-bot/ifl-backend:${IFL_IMAGE_TAG:-latest}
    container_name: ifl_worker
    restart: unless-stopped
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Celery 가 SIGTERM 받고 진행 중 태스크를 ack 할 때까지 충분한 여유를 둠.
    # acks_late=True 와 결합해 죽임 당해도 메시지 유실 없이 다른 worker 가 재처리.
    stop_grace_period: 60s
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app:celery inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  beat:
    image: ghcr.io/hdj82-bot/ifl-backend:${IFL_IMAGE_TAG:-latest}
    container_name: ifl_beat
    restart: unless-stopped
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/hdj82-bot/ifl-frontend:${IFL_IMAGE_TAG:-latest}
    # container_name 제거: backend 와 동일하게 rolling restart 를 위해 scale-friendly.
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    # Next.js standalone 서버가 진행 중 요청을 마치도록 SIGTERM 후 여유.
    stop_grace_period: 30s
    # Dockerfile 에 HEALTHCHECK 가 정의되어 있으나, 새 컨테이너 부팅 시간을 고려해
    # compose 레벨에서 start_period 를 명시한다 (rolling 대기 신호로 사용).
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    container_name: ifl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    container_name: ifl_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --deploy-hook \"echo Certificate renewed at $(date)\" 2>&1 | tee -a /etc/letsencrypt/renewal.log; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  upload_data:
