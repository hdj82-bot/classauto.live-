version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ifl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ifl_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/hdj82-bot/ifl-backend:${IFL_IMAGE_TAG:-latest}
    container_name: ifl_backend
    restart: unless-stopped
    env_file:
      - .env
    # 호스트 포트 미노출 — nginx 가 Docker 내부 네트워크(backend:8000)로 접근.
    # Docker 는 UFW 규칙을 우회하므로 ports 매핑 시 공용 인터넷에 노출되어
    # nginx/SSL/rate-limit/CSP 가 전부 우회됨.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads
      - ./scripts/docker-entrypoint.sh:/opt/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/opt/docker-entrypoint.sh"]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  worker:
    image: ghcr.io/hdj82-bot/ifl-backend:${IFL_IMAGE_TAG:-latest}
    container_name: ifl_worker
    restart: unless-stopped
    command: celery -A app.celery_app:celery worker --loglevel=info --concurrency=4
    env_file:
      - .env
    volumes:
      - upload_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_app:celery inspect ping --timeout 10 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  beat:
    image: ghcr.io/hdj82-bot/ifl-backend:${IFL_IMAGE_TAG:-latest}
    container_name: ifl_beat
    restart: unless-stopped
    command: celery -A app.celery_app:celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/hdj82-bot/ifl-frontend:${IFL_IMAGE_TAG:-latest}
    container_name: ifl_frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: ifl_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    container_name: ifl_certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet --deploy-hook \"echo Certificate renewed at $(date)\" 2>&1 | tee -a /etc/letsencrypt/renewal.log; sleep 12h & wait $${!}; done;'"
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  upload_data:
